name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          AFFE6D: ${{ secrets.AFFE6D }}
          B28BA9: ${{ secrets.B28BA9 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AFFE6D', '')
          meta_b = os.environ.get('B28BA9', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- de142e93481e17b32f3cf4157b3e0f7eaa94ffda9d852e -->', meta_a)
          if meta_b:
              out = out.replace('<!--  -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
